crystal.welcome=欢迎游玩Crystal!它可以算是合晶的延续，继承了合晶的部分东西，但是更多的细节需要你亲自探索。\n注意：\n1.模组目前不支持剧情回溯，如果你想看多个选项的剧情的话,等我更新\n2.玩家立绘暂时没画，画安亦雨我就已经燃尽了……玩家以后再画\n3.目前我对网络通信部分一概不知，因此模组联机极有可能出现猎奇bug\n4.剧情最好[#FF0000FF]一次性[]看完,尤其是有选项的时候，免得发生未知问题\n5.游戏UI缩放建议70%或75%免得对话框变形

