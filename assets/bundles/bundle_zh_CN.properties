#对话@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
jianglindian_lanuch-1=恍惚间，紫色的雷光划破天际，刺耳的雷声在耳畔炸响，夹杂着不知名的吼声
jianglindian_lanuch-2=应该，好像是很疼的吧
jianglindian_lanuch-3=感知到的一切都好像蒙了一层雾，感官，似乎早已麻木
jianglindian_lanuch-4=又似乎身处在无垠的黑暗中，被朦胧的坠落感所吞噬
jianglindian_lanuch-5=意识，逐渐远去，只剩万籁俱寂
jianglindian_lanuch-6=喂喂，你怎么了，快醒醒啊
jianglindian_lanuch-7=唔…嗯…头好痛
jianglindian_lanuch-8=你终于醒了，现在感觉怎么样?
jianglindian_lanuch-9=呃，你是？
jianglindian_lanuch-10=我叫安亦雨，路过此地发现你昏迷于此。这里是发生什么事了吗？
jianglindian_lanuch-11=我叫…我应该叫{0},我不知道我为什么会在这里…
jianglindian_lanuch-12=你记不起来之前的事了吗？
jianglindian_lanuch-13=嗯……记忆很模糊，什么都想不起来。
jianglindian_lanuch-14=那你现在做何打算
jianglindian_lanuch-15=我…我不知道
jianglindian_lanuch-16=这里总有"净墟"的单位横行，十分危险，你…要不要与我结伴而行
jianglindian_lanuch-17=(疑惑)哈？
jianglindian_lanuch-18=你什么眼神啊，我长的像坏人吗？
jianglindian_lanuch-19=不…不是，我只是觉得有点不妥吧
jianglindian_lanuch-20=哪里不妥了？本小姐可是都同意了
jianglindian_lanuch-21=(小声)就你一个人同意了吧…
jianglindian_lanuch-22=别磨蹭啦，留下来作伴，总比你一个人失忆乱闯强。
jianglindian_lanuch-23=那，以后多多指教了，亦雨小姐，以后估计要麻烦你了
jianglindian_lanuch-24=不麻烦，有个伴我也挺开心的。那我们就一起走吧。还有，叫我亦雨就好啦
jianglindian_lanuch-25=……………
jianglindian_lanuch-26=怎么了？
jianglindian_lanuch-27=我们好像有麻烦了，这里驻扎着一些单位，不太好惹的样子，他们已经注意到了我们，正在向这里进发
jianglindian_lanuch-28=是那个什么"净墟"吗
jianglindian_lanuch-29=应该是的，这附近主要是他们的势力。"净墟"残暴成性，会碾碎一切活物
jianglindian_lanuch-30=我们要迎击吗？
jianglindian_lanuch-31=等一下，(把手按在你胸口，似乎在感受着什么)你身上竟然有科技文明的气息
jianglindian_lanuch-32=科技文明？那是什么
jianglindian_lanuch-33=来不及解释了，先扛过这一劫再说
jianglindian_lanuch-34=科技文明的力量可以变形收集的资源构建防御体系
jianglindian_lanuch-35=现在只能靠你收集资源，建造防御，打退敌人，占领这里了
jianglindian_lanuch-36=拜托你了，{0}
jianglindian_lanuch-37=我该如何使用这种力量？
jianglindian_lanuch-38=你本该知道的吧
jianglindian_lanuch-39=本该…嗯，我知道该怎么做了。你在我身后待着，不要乱跑
jianglindian_lanuch-40=要注意安全呀,{0}

jianglindian_intro-1=亦雨小姐，这里……
jianglindian_intro-2=哎呀，都说了叫我亦雨就可以了，你那么叫也太生分了
jianglindian_intro-3=那亦雨，这里是哪里啊？
jianglindian_intro-4=这个世界是一颗叫凌星的星球，虽然比较低级，但也可以进行修炼
jianglindian_intro-5=修炼？那是什么？
jianglindian_intro-6=你的记忆还真是丢得一点不剩了啊，真就什么都不记得了？
jianglindian_intro-7=啊哈哈
jianglindian_intro-8=算了，我就当一回老师，要听好了
jianglindian_intro-9=你应该已经看见了右边的修为按钮，点击它可以查看基础的修为信息
jianglindian_intro-10=如果你觉得这个按钮有点碍事，可以在设置-Crystal-显示修为中关闭显示
jianglindian_intro-11=击杀敌方单位可以增长修为
jianglindian_intro-12=哦，我明白了，但是这个功法是什么？
jianglindian_intro-13=到时候再说吧，我讲累了，先歇一会儿
jianglindian_intro-14=等一下，我还有几个问题……
jianglindian_intro-15=Zzzzzzzzz
jianglindian_intro-16=这么快就睡着了？那我还是先自己探索吧

jianglindian_gongfa-1=看来你的修为已经进入了所在境界的巅峰状态，需要配合功法修炼才能突破
jianglindian_gongfa-2=我这边刚好有一卷太玄天功上卷，想不想要啊
jianglindian_gongfa-3=想要(可怜巴巴)
jianglindian_gongfa-4=叫姐姐就给你

jianglindian_gongfa-branch1-1=姐姐~
jianglindian_gongfa-branch1-2=你、你还真敢叫……
jianglindian_gongfa-branch1-3=拿去吧拿去吧，我才不是故意给你的！
jianglindian_gongfa-branch1-4=拿了就赶紧走吧，该杵在这里干嘛

jianglindian_gongfa-branch2-1=亦雨姐姐~
jianglindian_gongfa-branch2-2=呜哇~~你你你你你你你你你还真叫啊！
jianglindian_gongfa-branch2-3=给你给你！不许再这么叫了！
jianglindian_gongfa-branch2-4=赶紧走，不然我踹你了！

jianglindian_fatian-1={0},对面派出了修为在法境的单位，你估计会遇上点麻烦
jianglindian_fatian-2=法境的单位有什么不同吗？
jianglindian_fatian-3=他们可以使用一门名叫法天象地的神通，使他们的攻击与血量得到强化
jianglindian_fatian-4=感觉很难打的样子…
jianglindian_fatian-5=放心，只要破了他们的法身，那么他们就和普通单位一样了，而且法境单位修为低微，不足为惧
jianglindian_fatian-6=感觉还是好难啊
jianglindian_fatian-7=嘻嘻，那我不管，难道你要我一介弱女子去打怪？
jianglindian_fatian-8=我相信你一定可以的，等你的好消息哦
jianglindian_fatian-9=既然这样，那就上吧

jianglindian_capture-1=呼，危机解决啦，多亏你啦，{0}
jianglindian_capture-2=感觉也不算太难打啊
jianglindian_capture-3="净墟"居然敢攻击我们，他的老巢在哪里，我要去灭了他们
jianglindian_capture-4=等一下,这不过是一支小分队而已。"净墟"虽然不是大势力，但也有神境的强大单位坐镇，你虽然对科技的使用已经较为熟练，但还是无法与之抗衡
jianglindian_capture-5=真的没有办法吗
jianglindian_capture-6=如果你真的想去的话，也不是不可以
jianglindian_capture-7=你的修为突破很快，而且你拥有科技文明的力量，跨境界作战是可以做到的
jianglindian_capture-8=跟我来吧，往这边走
jianglindian_capture-9=你也要去？这会很危险的
jianglindian_capture-10=净墟也攻击了我，而且我对世界的认识远高于你，可以为你提供帮助
jianglindian_capture-11=而且不是说好要结伴同行吗
jianglindian_capture-12=……谢谢你，亦雨
jianglindian_capture-13=不用那么客气啦，我们出发吧
